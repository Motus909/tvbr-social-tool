<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <title>TV Bad Ragaz – Social Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="brand-title">TV Bad Ragaz</div>
      <div class="brand-sub">Social Tool</div>
    </div>
    <nav class="tabs">
      <button class="tabbtn active" data-tab="grading">Grading</button>
      <button class="tabbtn" data-tab="generator">Titelbild</button>
    </nav>
  </div>
</header>

<!-- TAB 1: Titelbild -->
<section id="tab-generator" class="tabcontent">
  <main class="main main--generator">

    <div class="canvas-wrap">
      <canvas id="canvas" width="1080" height="1350"></canvas>
    </div>

    <section class="controls">
      <label class="label">Bild</label>
      <input class="control" type="file" id="imageUpload" accept="image/*" />

      <label class="label">Titel</label>
      <input class="control" type="text" id="titleInput" placeholder="z.B. Dr schnellscht Ragazer" maxlength="60"/>

      <label class="label">Kategorie</label>
      <select class="control" id="stufeSelect">
        <option value="aktiv">Aktiv</option>
        <option value="jugi">Jugi</option>
        <option value="gesellschaft">Gesellschaft</option>
      </select>

      <label class="label" id="riegeLabel">Riege</label>
      <select class="control" id="categorySelect">
        <option value="aktiv-la">LA</option>
        <option value="aktiv-getu">Getu</option>
        <option value="aktiv-gym">Gym</option>
        <option value="aktiv-athletics">Ragaz Athletics</option>
      </select>

      <div class="row">
        <button class="btn" id="fitBtn" type="button">Auto-Fit</button>
        <button class="btn secondary" id="resetBtn" type="button">Reset</button>
      </div>

      <button class="btn primary" id="downloadBtn" type="button">PNG herunterladen</button>
    </section>

  </main>
</section>

<!-- TAB 2: Grading -->
<section id="tab-grading" class="tabcontent active">
  <main class="main main--grading">

    <div class="thumbnail-container" id="thumbnailContainer"></div>

    <div class="canvas-wrap">
      <canvas id="gradeCanvas" width="1080" height="1350"></canvas>
    </div>

    <!-- Mobile: Slider-Bar direkt unter Canvas -->
    <div class="mobile-sliders">
      <div class="mobile-slider-btns">
        <button class="mslider-btn active" data-slider="b"    data-min="-40" data-max="40"  type="button"><span class="mslider-icon">☀</span><span class="mslider-label">Helligkeit</span></button>
        <button class="mslider-btn"        data-slider="c"    data-min="-40" data-max="40"  type="button"><span class="mslider-icon">◑</span><span class="mslider-label">Kontrast</span></button>
        <button class="mslider-btn"        data-slider="hl"   data-min="-40" data-max="40"  type="button"><span class="mslider-icon">△</span><span class="mslider-label">Highlights</span></button>
        <button class="mslider-btn"        data-slider="sh"   data-min="-40" data-max="40"  type="button"><span class="mslider-icon">▽</span><span class="mslider-label">Schatten</span></button>
        <button class="mslider-btn"        data-slider="s"    data-min="-40" data-max="40"  type="button"><span class="mslider-icon">❋</span><span class="mslider-label">Sättigung</span></button>
        <button class="mslider-btn"        data-slider="k"    data-min="0"   data-max="30"  type="button"><span class="mslider-icon">⬡</span><span class="mslider-label">Klarheit</span></button>
        <button class="mslider-btn"        data-slider="tmp"  data-min="-40" data-max="40"  type="button"><span class="mslider-icon">🌡</span><span class="mslider-label">Temperatur</span></button>
        <button class="mslider-btn"        data-slider="tint" data-min="-40" data-max="40"  type="button"><span class="mslider-icon">🎨</span><span class="mslider-label">Tint</span></button>
        <button class="mslider-btn"        data-slider="vig"  data-min="0"   data-max="40"  type="button"><span class="mslider-icon">◎</span><span class="mslider-label">Vignette</span></button>
        <button class="mslider-btn"        data-slider="shrp" data-min="0"   data-max="30"  type="button"><span class="mslider-icon">◈</span><span class="mslider-label">Schärfe</span></button>
        <button class="mslider-btn"        data-slider="rot"  data-min="-15" data-max="15"  type="button"><span class="mslider-icon">⟳</span><span class="mslider-label">Rotation</span></button>
      </div>
      <div class="mobile-slider-track">
        <input class="mobile-slider-range" id="mSlider" type="range" min="-40" max="40" value="0">
        <button class="mobile-reset-btn" id="mSliderReset" type="button">↻</button>
      </div>
    </div>

    <section class="controls">
      <label class="label">Fotos (mehrere möglich)</label>
      <input class="control" type="file" id="gradeUpload" accept="image/*" multiple>

      <button class="btn secondary" id="resetGradeBtn" type="button">Reset All</button>

      <label class="label">Preset</label>
      <select id="category-select" class="control">
        <option value="drinnen">Drinnen</option>
        <option value="draussen">Draußen</option>
        <option value="sport">Sport</option>
        <option value="portraits">Portraits</option>
      </select>
      <div class="row">
        <button id="auto-grade-button" class="btn">Preset anwenden</button>
        <button id="gradeAutoFitBtn" class="btn secondary">Auto-Fit</button>
      </div>

      <div class="form-group">
        <input type="checkbox" id="titleImageCheckbox">
        <label for="titleImageCheckbox">Als Titelbild verwenden</label>
      </div>

      <div class="row">
        <button class="btn" id="prevImgBtn" type="button">◀ Vorheriges</button>
        <button class="btn" id="nextImgBtn" type="button">Nächstes ▶</button>
      </div>

      <div class="row">
        <button class="btn primary" id="downloadGradeBtn" type="button">Herunterladen</button>
        <button class="btn primary" id="downloadAllBtn" type="button">Alle laden</button>
      </div>

      <div class="accordion">
        <button class="accordion-toggle" type="button" aria-expanded="false">
          Farbkorrektur <span class="accordion-arrow">▸</span>
        </button>
        <div class="accordion-body">
          <div class="sliderBlock"><div class="sliderLabel">Helligkeit</div><div class="sliderLine"><input class="control" type="range" id="bSlider" min="-40" max="40" value="0"><button class="iconbtn" id="bReset" type="button">↻</button></div></div>
          <div class="sliderBlock"><div class="sliderLabel">Kontrast</div><div class="sliderLine"><input class="control" type="range" id="cSlider" min="-40" max="40" value="0"><button class="iconbtn" id="cReset" type="button">↻</button></div></div>
          <div class="sliderBlock"><div class="sliderLabel">Highlights</div><div class="sliderLine"><input class="control" type="range" id="hlSlider" min="-40" max="40" value="0"><button class="iconbtn" id="hlReset" type="button">↻</button></div></div>
          <div class="sliderBlock"><div class="sliderLabel">Schatten</div><div class="sliderLine"><input class="control" type="range" id="shSlider" min="-40" max="40" value="0"><button class="iconbtn" id="shReset" type="button">↻</button></div></div>
          <div class="sliderBlock"><div class="sliderLabel">Sättigung</div><div class="sliderLine"><input class="control" type="range" id="sSlider" min="-40" max="40" value="0"><button class="iconbtn" id="sReset" type="button">↻</button></div></div>
          <div class="sliderBlock"><div class="sliderLabel">Klarheit</div><div class="sliderLine"><input class="control" type="range" id="kSlider" min="0" max="30" value="0"><button class="iconbtn" id="kReset" type="button">↻</button></div></div>
          <div class="sliderBlock"><div class="sliderLabel">Temperatur</div><div class="sliderLine"><input class="control" type="range" id="tmpSlider" min="-40" max="40" value="0"><button class="iconbtn" id="tmpReset" type="button">↻</button></div></div>
          <div class="sliderBlock"><div class="sliderLabel">Tint</div><div class="sliderLine"><input class="control" type="range" id="tintSlider" min="-40" max="40" value="0"><button class="iconbtn" id="tintReset" type="button">↻</button></div></div>
          <div class="sliderBlock"><div class="sliderLabel">Vignette</div><div class="sliderLine"><input class="control" type="range" id="vigSlider" min="0" max="40" value="0"><button class="iconbtn" id="vigReset" type="button">↻</button></div></div>
          <div class="sliderBlock"><div class="sliderLabel">Schärfe</div><div class="sliderLine"><input class="control" type="range" id="shrpSlider" min="0" max="30" value="0"><button class="iconbtn" id="shrpReset" type="button">↻</button></div></div>
          <div class="sliderBlock"><div class="sliderLabel">Rotation</div><div class="sliderLine"><input class="control" type="range" id="rotSlider" min="-15" max="15" step="0.5" value="0"><button class="iconbtn" id="rotReset" type="button">↻</button></div></div>
        </div>
      </div>

    </section>
  </main>
</section>

<script src="app.js"></script>
<script src="grade.js"></script>
<script>
  // Mobile slider bar
  const SLIDER_ID_MAP = {
    b:'bSlider', c:'cSlider', hl:'hlSlider', sh:'shSlider', s:'sSlider',
    k:'kSlider', tmp:'tmpSlider', tint:'tintSlider', vig:'vigSlider',
    shrp:'shrpSlider', rot:'rotSlider'
  };
  let mSliderActive = 'b';
  const mSlider      = document.getElementById('mSlider');
  const mSliderReset = document.getElementById('mSliderReset');
  const mBtns        = document.querySelectorAll('.mslider-btn');

  function syncMSlider() {
    const activeBtn = document.querySelector(`.mslider-btn[data-slider="${mSliderActive}"]`);
    if (!mSlider || !activeBtn) return;
    mSlider.min   = activeBtn.dataset.min;
    mSlider.max   = activeBtn.dataset.max;
    mSlider.step  = mSliderActive === 'rot' ? '0.5' : '1';
    const src = document.getElementById(SLIDER_ID_MAP[mSliderActive]);
    mSlider.value = src ? src.value : 0;
  }

  mBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      mBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      mSliderActive = btn.dataset.slider;
      syncMSlider();
    });
  });

  mSlider?.addEventListener('input', () => {
    const target = document.getElementById(SLIDER_ID_MAP[mSliderActive]);
    if (target) {
      target.value = mSlider.value;
      target.dispatchEvent(new Event('input', { bubbles: true }));
    }
  });

  mSliderReset?.addEventListener('click', () => {
    const target = document.getElementById(SLIDER_ID_MAP[mSliderActive]);
    if (target) {
      target.value = 0;
      target.dispatchEvent(new Event('input', { bubbles: true }));
      if (mSlider) mSlider.value = 0;
    }
  });

  Object.entries(SLIDER_ID_MAP).forEach(([key, id]) => {
    document.getElementById(id)?.addEventListener('input', () => {
      if (key === mSliderActive && mSlider)
        mSlider.value = document.getElementById(id).value;
    });
  });

  // Stufe → Riege dynamic update
  const RIEGEN = {
    aktiv: [
      { value: "aktiv-la",        label: "LA" },
      { value: "aktiv-getu",      label: "Getu" },
      { value: "aktiv-gym",       label: "Gym" },
      { value: "aktiv-athletics", label: "Ragaz Athletics" },
    ],
    jugi: [
      { value: "jugi-la",         label: "LA" },
      { value: "jugi-getu",       label: "Getu" },
      { value: "jugi-gym",        label: "Gym" },
      { value: "jugi-athletics",  label: "Ragaz Athletics" },
    ],
    gesellschaft: []
  };

  const stufeSelect    = document.getElementById('stufeSelect');
  const riegeLabel     = document.getElementById('riegeLabel');

  function updateRiegen(triggerDraw) {
    const stufe  = stufeSelect.value;
    const riegen = RIEGEN[stufe] || [];
    categorySelect.innerHTML = '';
    if (riegen.length === 0) {
      categorySelect.style.display = 'none';
      riegeLabel.style.display     = 'none';
      const opt = document.createElement('option');
      opt.value = 'gesellschaft';
      opt.textContent = 'TV Bad Ragaz';
      categorySelect.appendChild(opt);
    } else {
      categorySelect.style.display = '';
      riegeLabel.style.display     = '';
      riegen.forEach(r => {
        const opt = document.createElement('option');
        opt.value = r.value;
        opt.textContent = r.label;
        categorySelect.appendChild(opt);
      });
    }
    if (triggerDraw && typeof draw === 'function') draw();
  }

  stufeSelect.addEventListener('change', () => updateRiegen(true));
  updateRiegen(true); // init with draw

  // Grading Auto-Fit
  document.getElementById('gradeAutoFitBtn')?.addEventListener('click', () => {
    if (typeof window.gradeAutoFit === 'function') window.gradeAutoFit();
  });

  // Accordion
  document.querySelectorAll('.accordion-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const expanded = btn.getAttribute('aria-expanded') === 'true';
      btn.setAttribute('aria-expanded', String(!expanded));
      btn.querySelector('.accordion-arrow').textContent = expanded ? '▸' : '▾';
      const body = btn.nextElementSibling;
      body.style.maxHeight = expanded ? '0' : body.scrollHeight + 'px';
    });
  });

  // Tabs
  const btns = document.querySelectorAll(".tabbtn");
  const tabs = {
    generator: document.getElementById("tab-generator"),
    grading:   document.getElementById("tab-grading"),
  };
  btns.forEach(b => b.addEventListener("click", () => {
    btns.forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    Object.values(tabs).forEach(t => t.classList.remove("active"));
    tabs[b.dataset.tab].classList.add("active");
  }));
</script>
</body>
</html>
